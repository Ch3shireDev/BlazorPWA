name: Build and deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BlazorApp1.slnx

      - name: Publish (WASM)
        run: dotnet publish BlazorApp1/BlazorApp1.csproj -c Release -o ./publish

      # Pages potrzebuje 404.html (żeby routing SPA nie wywalał się na refreshu)
      - name: SPA fallback (404.html)
        run: |
          cp ./publish/wwwroot/index.html ./publish/wwwroot/404.html
          touch ./publish/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
